name: CI introduction

on:
  push:
    branches:
      - master
  # إضافة PR تضمن فحص الكود قبل دمجه في الفرع الرئيسي
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # تحديث للإصدار الرابع

      - name: Login to Docker
        # استخدام الأكشن الرسمي لـ Docker أكثر أماناً وسهولة
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t tawfiq/docker-react -f Dockerfile.dev .

      - name: Run Tests
        # إضافة CI=true تضمن أن الاختبارات ستعمل لمرة واحدة وتتوقف (بدون Watch mode)
        run: docker run -e CI=true tawfiq/docker-react npm run test