name: CI introduction

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Login to Docker
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t tawfiq/docker-react -f Dockerfile.dev .

      - name: Run Tests
        run: docker run -e CI=true tawfiq/docker-react npm run test